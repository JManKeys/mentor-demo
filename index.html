<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MENTOR™ Residency · Leadership Demo</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0F4F8; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  textarea, input { font-family: inherit; }
  button { font-family: inherit; cursor: pointer; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(224,177,131,0.4); }
    70%  { box-shadow: 0 0 0 8px rgba(224,177,131,0); }
    100% { box-shadow: 0 0 0 0 rgba(224,177,131,0); }
  }
  .fade-in  { animation: fadeIn 0.4s ease forwards; }
  .slide-in { animation: fadeSlideIn 0.4s ease forwards; }
  .slide-in-delay { animation: fadeSlideIn 0.4s ease 0.15s both; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C0C8D4; border-radius: 4px; }

  .app-shell { max-width: 480px; }
  @media (min-width: 900px) {
    .app-shell { max-width: 760px; }
    .desktop-row { display: flex; gap: 20px; align-items: flex-start; }
    .desktop-row > * { flex: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

/*
  BRAND TOKENS — updated June 25 to match the new brand guidelines
  (FINAL_-_Mentor_Brand_Guidelines_-_06_23_2026.pdf), which replaced
  three of the five core hex values from the prior brand book:
    Mentor Blue:      #004B8D -> #004DAC
    Mentor Dark Blue:  renamed "Mentor Navy" in the new doc, #002334 -> #002756
    Mentor Cream:      renamed "Mentor Off-White" in the new doc, #FFFBF4 -> #f8f2ed
  Copper and Light Blue are unchanged. Token names kept as-is (darkBlue,
  cream) so they still read clearly in code, even though the brand book
  now calls them Navy / Off-White.
*/
const B = {
  darkBlue:  "#002756",
  blue:      "#004DAC",
  lightBlue: "#E4EFF7",
  copper:    "#E0B183",
  cream:     "#F8F2ED",
  white:     "#FFFFFF",
  midGrey:   "#8A8A8A",
  softGrey:  "#F5F7FA",
  text:      "#32302F",
  green:     "#EDF7EE",
  greenBorder: "#A8D5B0",
  amber:     "#FFF8EE",
  amberBorder: "#E8C87A",
};

function scrollTop(ref) {
  if (ref && ref.current) ref.current.scrollTo({ top: 0, behavior: "smooth" });
}

/*
  PILL BUTTONS — the new brand book (p.53, "Design elements") specifies
  "Always use a rounded, pill-shape" for CTAs. No exact radius is given,
  so this uses a radius greater than half the button's height, which is
  what makes a shape read as a true pill rather than a rounded rectangle.
*/
function PrimaryBtn({ onClick, disabled, children, style = {} }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#C8D4E0" : B.blue,
      color: disabled ? "#8A9AAA" : B.white,
      border: "none", borderRadius: 28, padding: "14px 24px",
      fontSize: 15, fontWeight: 700, width: "100%",
      cursor: disabled ? "not-allowed" : "pointer",
      transition: "all 0.2s ease", letterSpacing: 0.3,
      ...style,
    }}>{children}</button>
  );
}

function SecondaryBtn({ onClick, children, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: "transparent", color: B.blue,
      border: `1.5px solid ${B.blue}`, borderRadius: 28,
      padding: "12px 24px", fontSize: 14, fontWeight: 600,
      width: "100%", cursor: "pointer", transition: "all 0.2s ease",
      ...style,
    }}>{children}</button>
  );
}

function Header() {
  return (
    <div style={{
      background: B.darkBlue, padding: "14px 20px",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      position: "sticky", top: 0, zIndex: 10,
      boxShadow: "0 2px 12px rgba(0,0,0,0.25)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{
          width: 8, height: 8, borderRadius: "50%",
          background: B.copper, boxShadow: `0 0 6px ${B.copper}`,
          animation: "pulseRing 2.5s ease infinite",
        }} />
        <span style={{ color: B.white, fontSize: 13, fontWeight: 700, letterSpacing: 0.5 }}>
          MENTOR™ Residency
        </span>
      </div>
      <div style={{
        background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.6)",
        fontSize: 11, padding: "3px 10px", borderRadius: 20, letterSpacing: 1,
      }}>Leadership demo</div>
    </div>
  );
}

function ProgressDots({ beatIndex, total }) {
  return (
    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 8 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: i === beatIndex ? 24 : 8, height: 8, borderRadius: 4,
          background: i < beatIndex ? B.copper : i === beatIndex ? B.blue : "#D0D8E4",
          transition: "all 0.3s ease",
        }} />
      ))}
    </div>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{
      fontSize: 10, fontWeight: 700, letterSpacing: 1.2,
      color: B.midGrey, marginBottom: 10, textTransform: "uppercase",
    }}>{children}</div>
  );
}

function SarahBubble({ text, mood, animClass = "slide-in" }) {
  const moodStyles = {
    open:    { bg: B.lightBlue, border: B.blue },
    engaged: { bg: "#EAF5EB",   border: "#6DBF79" },
    quiet:   { bg: B.amber,     border: B.amberBorder },
  };
  const s = moodStyles[mood] || { bg: B.cream, border: "#D0D0D0" };
  return (
    <div className={animClass} style={{
      background: s.bg, border: `1.5px solid ${s.border}`,
      borderRadius: "4px 16px 16px 16px", padding: "14px 16px", marginBottom: 16,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <div style={{
          width: 28, height: 28, borderRadius: "50%",
          background: `linear-gradient(135deg, ${B.copper} 0%, #C49060 100%)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 12, fontWeight: 700, color: B.white, flexShrink: 0,
        }}>S</div>
        <span style={{ fontSize: 12, fontWeight: 700, color: B.darkBlue, letterSpacing: 0.3 }}>SARAH</span>
      </div>
      <p style={{ fontSize: 15, color: B.text, lineHeight: 1.55, fontStyle: "italic" }}>{text}</p>
    </div>
  );
}

function MissNote({ text }) {
  return (
    <div className="slide-in" style={{
      background: "#FFF8EE", border: `1px solid ${B.amberBorder}`,
      borderLeft: `4px solid ${B.copper}`, borderRadius: "0 10px 10px 0",
      padding: "12px 14px", marginBottom: 16,
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#A07020", letterSpacing: 0.8, marginBottom: 4 }}>
        NOTICE THE SHIFT
      </div>
      <p style={{ fontSize: 13, color: "#705010", lineHeight: 1.5 }}>{text}</p>
    </div>
  );
}

function StrongNote({ text }) {
  return (
    <div className="slide-in" style={{
      background: B.green, border: `1px solid ${B.greenBorder}`,
      borderLeft: `4px solid #4FA868`, borderRadius: "0 10px 10px 0",
      padding: "12px 14px", marginBottom: 16,
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#2E7D44", letterSpacing: 0.8, marginBottom: 4 }}>
        STRONG MOVE
      </div>
      <p style={{ fontSize: 13, color: "#1F5C32", lineHeight: 1.5 }}>{text}</p>
    </div>
  );
}

// Placeholder-only — no real video source. This demo never plays an
// actual embed; the point is to show where it lives in the flow.
function VideoCard({ label, desc, src }) {
  return (
    <div className="slide-in" style={{
      background: B.darkBlue, borderRadius: 14, overflow: "hidden", marginBottom: 16,
    }}>
      <div style={{ padding: "16px" }}>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: 0.8, marginBottom: 6 }}>
          EXPERT VIDEO
        </div>
        <div style={{ fontSize: 14, fontWeight: 700, color: B.white, marginBottom: 8, lineHeight: 1.4 }}>
          {label}
        </div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)", lineHeight: 1.5, marginBottom: 14 }}>
          {desc}
        </div>
        <video
          src={src}
          controls
          preload="metadata"
          style={{
            width: "100%", borderRadius: 10, display: "block",
            background: "#000",
          }}
        />
      </div>
    </div>
  
  );
}

function Shell({ children, scrollRef }) {
  return (
    <div style={{
      minHeight: "100vh",
      background: `linear-gradient(160deg, ${B.cream} 0%, #F0F4F8 100%)`,
      display: "flex", justifyContent: "center",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
    }}>
      <div className="app-shell" style={{ width: "100%", display: "flex", flexDirection: "column" }}>
        <Header />
        <div ref={scrollRef} style={{ padding: "24px 20px 60px", flex: 1, overflowY: "auto" }}>
          {children}
        </div>
      </div>
    </div>
  );
}

/*
  ── Intro screen ──
  Sentence case throughout, no headline punctuation beyond the one
  two-sentence exception — per the new brand book's typography rules
  (p.40: "Always use sentence case for all copy" / "Don't use
  punctuation unless the headline is broken into two sentences").
*/
function IntroScreen({ onStart }) {
  return (
    <div className="fade-in">
      <div style={{
        display: "inline-block", background: B.lightBlue,
        borderRadius: 20, padding: "5px 12px", marginBottom: 20,
      }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: B.blue, letterSpacing: 0.8 }}>
          MODULE 2 · ANATOMY, MEASUREMENTS & DECISION MAKING
        </span>
      </div>
      <h1 style={{ fontSize: 26, fontWeight: 400, color: B.darkBlue, lineHeight: 1.2, marginBottom: 12 }}>
        The consultation simulation
      </h1>
      <p style={{ fontSize: 15, color: B.text, lineHeight: 1.6, marginBottom: 24 }}>
        You're about to meet Sarah — a 36-year-old patient in her first breast augmentation consultation.
      </p>

      <div className="desktop-row">
      <div style={{
        background: B.white, borderRadius: 16, border: "1.5px solid #E2E8F0",
        padding: "18px", marginBottom: 24, boxShadow: "0 2px 12px rgba(0,0,50,0.06)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <div style={{
            width: 40, height: 40, borderRadius: "50%", background: B.copper, color: B.white,
            display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 16,
          }}>S</div>
          <div>
            <div style={{ fontWeight: 700, color: B.darkBlue, fontSize: 16 }}>Sarah</div>
            <div style={{ fontSize: 12, color: B.midGrey }}>Age 36 · Office manager · First consultation</div>
          </div>
        </div>
        <div style={{
          background: B.softGrey, borderRadius: 10, padding: "12px 14px",
          marginBottom: 12, borderLeft: `3px solid ${B.copper}`,
        }}>
          <p style={{ fontSize: 13, color: B.text, lineHeight: 1.55, fontStyle: "italic" }}>
            "My friend got 400cc and looks incredible. I'm pretty sure that's what I want — but she said we might need something different. I just want to make sure I end up with the right size."
          </p>
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {["Safety-focused", "CC fixation"].map(tag => (
            <span key={tag} style={{
              background: B.lightBlue, color: B.blue, fontSize: 11, fontWeight: 600,
              padding: "3px 9px", borderRadius: 20, letterSpacing: 0.3,
            }}>{tag}</span>
          ))}
        </div>
      </div>

      <div style={{
        background: B.white, borderRadius: 16, border: "1.5px solid #E2E8F0",
        padding: "18px", marginBottom: 24, boxShadow: "0 2px 12px rgba(0,0,50,0.06)",
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: B.darkBlue, letterSpacing: 0.5, marginBottom: 14 }}>
          How this works
        </div>
        {[
          "Sarah speaks. Read carefully — not just what she says, but how she says it.",
          "Choose your response.",
          "See how Sarah reacts, then watch the surgeon video.",
        ].map((step, i) => (
          <div key={i} style={{ display: "flex", gap: 12, marginBottom: i < 2 ? 10 : 0 }}>
            <div style={{
              width: 22, height: 22, borderRadius: "50%", background: B.darkBlue, color: B.white,
              fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center",
              justifyContent: "center", flexShrink: 0, marginTop: 1,
            }}>{i + 1}</div>
            <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>{step}</p>
          </div>
        ))}
      </div>
      </div>

      <PrimaryBtn onClick={onStart}>Begin consultation →</PrimaryBtn>
    </div>
  );
}

/*
  ── Single demo beat ──
  This is Sarah's Module 2 Beat 2 content (the cc-fixation topic),
  trimmed to stand alone for a 30-second leadership demo. Back resets
  the choice cleanly per Standard Section 6.3's "free play" navigation
  rule — going back clears the chosen option, not just the screen.
*/
const DEMO_BEAT = {
  topicQuestion: `"My friend has 400cc and looks incredible — I'm pretty sure that's what I want. But she said we might need something different. Why would the same number look different on two people?"`,
  videoLabel: "Redirecting the Volume Fixation",
  videoDesc: "How to redirect a patient fixated on a specific cc number toward a goal-based conversation about proportion and outcome.",
  sarahOpen: `"So my friend had her augmentation done about a year ago — she got 400cc and honestly looks incredible. I'm pretty sure that's what I want, but she mentioned I might need something different because we're built differently? I just want to make sure I end up with the right size."`,
  sarahMood: "open",
  options: [
    {
      label: "A",
      text: "Tell Sarah that 400cc may or may not be right for her — it depends entirely on what your measurements show — and pivot the conversation toward the outcome she's actually after.",
      quality: "miss",
      sarahReact: `"Oh. So... 400 might not even be the right number for me at all?"`,
      sarahMood: "quiet",
      missNote: "The pivot was clinically correct, but it landed too abruptly. Sarah heard \u2018you might be wrong\u2019 before she heard \u2018here's how we get you what you actually want.\u2019 She's gone quiet.",
    },
    {
      label: "B",
      text: "Validate that her friend's result looks great, then explain that the cc number is one input — not the goal. Walk her through how anatomy shapes the outcome.",
      quality: "strong",
      sarahReact: `"Okay — that actually makes sense. So it's more about what's proportionate for me specifically, not just copying the number."`,
      sarahMood: "engaged",
      strongNote: "Validating her friend's result first, before introducing anatomy, kept Sarah from hearing this as a correction. She got to update her own thinking instead of defending it, which is why she's still engaged instead of going quiet.",
    },
    {
      label: "C",
      text: "Confirm that 400cc is a reasonable starting point and that you'll finalize the size after the exam. Avoid pushing back on the number directly.",
      quality: "weak",
      sarahReact: `"Great. Yeah, I figured that would probably work."`,
      sarahMood: "quiet",
      missNote: "Sarah feels confirmed — but the opportunity was missed. She still believes 400cc is the goal. You've validated a fixation instead of redirecting it.",
    },
  ],
};

function DemoBeatScreen({ onDone, scrollRef }) {
  const [chosen, setChosen] = useState(null);
  const [showVideo, setShowVideo] = useState(false);
  const [hovered, setHovered] = useState(null);

  const opt = chosen !== null ? DEMO_BEAT.options[chosen] : null;
  const isMiss = opt && (opt.quality === "miss" || opt.quality === "weak");
  const isStrong = opt && opt.quality === "strong";

  function handleChoose(idx) {
    setChosen(idx);
    setShowVideo(false);
    setTimeout(() => scrollTop(scrollRef), 100);
  }

  // Free-play back behavior (Standard 6.3): clears the chosen option
  // entirely rather than just visually stepping back.
  function handleBack() {
    setChosen(null);
    setShowVideo(false);
    setTimeout(() => scrollTop(scrollRef), 100);
  }

  return (
    <div>
      <ProgressDots beatIndex={0} total={1} />
      <div style={{ fontSize: 11, color: B.midGrey, textAlign: "center", marginBottom: 20 }}>
        Topic 1 of 1 · Module 2 demo
      </div>

      <SarahBubble text={DEMO_BEAT.sarahOpen} mood={DEMO_BEAT.sarahMood} animClass="slide-in" />

      {chosen === null ? (
        <div className="slide-in-delay">
          <SectionLabel>Your response</SectionLabel>
          {DEMO_BEAT.options.map((opt, idx) => (
            <button
              key={idx}
              onClick={() => handleChoose(idx)}
              onMouseEnter={() => setHovered(idx)}
              onMouseLeave={() => setHovered(null)}
              style={{
                background: hovered === idx ? B.lightBlue : B.white,
                border: `1.5px solid ${hovered === idx ? B.blue : "#D8E2EE"}`,
                borderRadius: 12, padding: "14px 16px", marginBottom: 10,
                width: "100%", textAlign: "left", cursor: "pointer",
                transition: "all 0.18s ease", display: "flex", gap: 12, alignItems: "flex-start",
              }}
            >
              <div style={{
                width: 24, height: 24, borderRadius: "50%",
                background: hovered === idx ? B.blue : "#E2EAF4",
                color: hovered === idx ? B.white : B.blue,
                fontSize: 12, fontWeight: 700, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.18s ease",
              }}>{opt.label}</div>
              <span style={{ fontSize: 14, color: B.text, lineHeight: 1.5 }}>{opt.text}</span>
            </button>
          ))}
        </div>
      ) : (
        <div>
          <div className="slide-in" style={{
            background: B.softGrey, borderRadius: 10, border: "1.5px solid #D8E2EE",
            padding: "12px 14px", marginBottom: 14,
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: B.midGrey, letterSpacing: 0.8, marginBottom: 6 }}>
              YOUR RESPONSE
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{
                width: 22, height: 22, borderRadius: "50%", background: B.blue, color: B.white,
                fontSize: 11, fontWeight: 700, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>{opt.label}</div>
              <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>{opt.text}</p>
            </div>
          </div>

          <SarahBubble text={opt.sarahReact} mood={opt.sarahMood} animClass="slide-in" />

          {isMiss && opt.missNote && <MissNote text={opt.missNote} />}
          {isStrong && opt.strongNote && <StrongNote text={opt.strongNote} />}

          {!showVideo ? (
            <div className="slide-in-delay">
              <PrimaryBtn onClick={() => { setShowVideo(true); setTimeout(() => scrollTop(scrollRef), 100); }}>
                Watch the surgeon video →
              </PrimaryBtn>
            </div>
          ) : (
            <div>
              <VideoCard label={DEMO_BEAT.videoLabel} desc={DEMO_BEAT.videoDesc} src="Adams_2.2.mp4" />
              <div className="slide-in-delay" style={{ marginBottom: 12 }}>
                <PrimaryBtn onClick={onDone}>Finish the consultation →</PrimaryBtn>
              </div>
            </div>
          )}

          <SecondaryBtn onClick={handleBack}>← Back to response options</SecondaryBtn>
        </div>
      )}
    </div>
  );
}

const REFLECTION_PROMPT = "Sarah almost didn't bring up the number in her head. What's one thing about how you responded that made it easier — or harder — for her to keep talking?";

function ReflectionScreen({ onFinish, scrollRef }) {
  const [reflection, setReflection] = useState("");

  return (
    <div className="fade-in">
      <div style={{
        background: B.darkBlue, borderRadius: 16, padding: "20px", marginBottom: 24,
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: B.copper, letterSpacing: 0.8, marginBottom: 8 }}>
          The consultation ends
        </div>
        <div style={{
          background: "rgba(255,255,255,0.07)", borderRadius: 10, padding: "12px 14px",
          borderLeft: `3px solid ${B.copper}`,
        }}>
          <p style={{ fontSize: 14, color: "rgba(255,255,255,0.85)", lineHeight: 1.55, fontStyle: "italic" }}>
            "Okay. I think I understand a lot more now than when I came in."
          </p>
          <div style={{ fontSize: 12, color: B.copper, marginTop: 6, fontWeight: 600 }}>— Sarah</div>
        </div>
      </div>

      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 20, fontWeight: 400, color: B.darkBlue, marginBottom: 10 }}>
          One last question
        </h2>
        <p style={{ fontSize: 15, color: B.text, lineHeight: 1.6, marginBottom: 16 }}>
          {REFLECTION_PROMPT}
        </p>
        <textarea
          value={reflection}
          onChange={e => setReflection(e.target.value)}
          placeholder="Write your reflection here..."
          rows={5}
          style={{
            width: "100%", padding: "12px 14px",
            border: `1.5px solid ${reflection.trim().length > 0 ? B.blue : "#D8E2EE"}`,
            borderRadius: 12, fontSize: 14, lineHeight: 1.6,
            resize: "none", outline: "none", color: B.text,
            background: B.softGrey, transition: "border-color 0.2s",
          }}
        />
        {reflection.trim().length > 0 && reflection.trim().length < 3 && (
          <p style={{ fontSize: 12, color: "#E57373", marginTop: 4 }}>
            Add a few more words to continue.
          </p>
        )}
      </div>

      <PrimaryBtn onClick={onFinish} disabled={reflection.trim().length < 3}>
        Complete module →
      </PrimaryBtn>
    </div>
  );
}

function CompleteScreen({ onReplay }) {
  return (
    <div className="fade-in">
      <div style={{
        background: `linear-gradient(135deg, ${B.darkBlue} 0%, #003D5C 100%)`,
        borderRadius: 20, padding: "24px 20px", marginBottom: 24, textAlign: "center",
      }}>
        <div style={{
          width: 52, height: 52, borderRadius: "50%", background: B.copper,
          margin: "0 auto 14px", display: "flex", alignItems: "center",
          justifyContent: "center", fontSize: 22,
        }}>✓</div>
        <h2 style={{ fontSize: 22, fontWeight: 400, color: B.white, marginBottom: 8 }}>
          Module 2 complete
        </h2>
        <p style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.5 }}>
          Anatomy, measurements & decision making
        </p>
      </div>

      <div style={{
        background: B.lightBlue, borderRadius: 14, border: `1.5px solid ${B.blue}`,
        padding: "14px 16px", marginBottom: 24,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: B.blue, letterSpacing: 0.5, marginBottom: 6 }}>
          Coming up in module 3
        </div>
        <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>
          Communicating options: incisions, placement & tradeoffs — a new patient, a different challenge.
        </p>
      </div>

      <SecondaryBtn onClick={onReplay}>← Replay demo</SecondaryBtn>

      <div style={{ fontSize: 11, color: B.midGrey, textAlign: "center", marginTop: 20, letterSpacing: 0.5 }}>
        MENTOR™ Residency Learning Journey · Leadership demo
      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState("intro"); // intro | beat | reflection | complete
  const scrollRef = useRef(null);

  function start() {
    setPhase("beat");
    scrollTop(scrollRef);
  }

  function goToReflection() {
    setPhase("reflection");
    scrollTop(scrollRef);
  }

  function finish() {
    setPhase("complete");
    scrollTop(scrollRef);
  }

  function replay() {
    setPhase("intro");
    scrollTop(scrollRef);
  }

  return (
    <Shell scrollRef={scrollRef}>
      {phase === "intro" && <IntroScreen onStart={start} />}
      {phase === "beat" && <DemoBeatScreen onDone={goToReflection} scrollRef={scrollRef} />}
      {phase === "reflection" && <ReflectionScreen onFinish={finish} scrollRef={scrollRef} />}
      {phase === "complete" && <CompleteScreen onReplay={replay} />}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
