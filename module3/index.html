<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MENTOR™ Residency · Module 3 Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<!-- Babel CDN — pinned per project standard. Unpinned unpkg.com serves "latest",
     which silently broke Module 1 and 2's original prototypes when Babel 7.29.0
     shipped a regression (Jan 2026). Never remove this version pin. -->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0F4F8; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  textarea, input { font-family: inherit; }
  button { font-family: inherit; cursor: pointer; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(224,177,131,0.4); }
    70%  { box-shadow: 0 0 0 8px rgba(224,177,131,0); }
    100% { box-shadow: 0 0 0 0 rgba(224,177,131,0); }
  }
  .fade-in  { animation: fadeIn 0.4s ease forwards; }
  .slide-in { animation: fadeSlideIn 0.4s ease forwards; }
  .slide-in-delay { animation: fadeSlideIn 0.4s ease 0.15s both; }
  .slide-in-delay2 { animation: fadeSlideIn 0.4s ease 0.3s both; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C0C8D4; border-radius: 4px; }

  /* Desktop breakpoint — matches Module 1 / shared components reference */
  .app-shell { max-width: 480px; }
  @media (min-width: 900px) {
    .app-shell { max-width: 760px; }
    .desktop-row { display: flex; gap: 20px; align-items: flex-start; }
    .desktop-row > * { flex: 1; }
    /* Video-frame desktop cap — independent of .app-shell width. Paired with
       VideoCard's aspectRatio property below (NOT paddingBottom percentage —
       see MENTOR_Residency_Pitfalls.md #8 for why that trick breaks here). */
    .video-frame { max-width: 340px; margin: 0 auto; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef, useEffect } = React;

// ── Brand tokens ──────────────────────────────────────────────────────────────
const B = {
  darkBlue:  "#002756",
  blue:      "#004DAC",
  lightBlue: "#E4EFF7",
  copper:    "#E0B183",
  cream:     "#f8f2ed",
  white:     "#FFFFFF",
  midGrey:   "#8A8A8A",
  softGrey:  "#F5F7FA",
  text:      "#1A1A1A",
  green:     "#EDF7EE",
  greenBorder: "#A8D5B0",
  amber:     "#FFF8EE",
  amberBorder: "#E8C87A",
  warning:   "#FFF3E0",
  warningBorder: "#E0A040",
};

// ── Beat data ─────────────────────────────────────────────────────────────────
// Source: Module_03_Beats_Working_Draft.md (both beats SETTLED) and
// Module_03_Claire.docx. Video selection per Residency_Video_Tracker.xlsx:
// 3.1 Primary Adams / Secondary Yates
// 3.2 Primary Mosharrafa / Secondary Yates
// No video assets are hosted yet for Module 3 — VideoCard renders its placeholder
// state (no localSrc/brightcoveUrl/vimeoId/streamSrc) until real clips are edited
// and hosted.
// Structural note: Module 3 has 2 Topic Questions/beats (Residency_Video_Tracker.xlsx
// rows 14–15; Module_03_Claire.docx persona doc), not 5 — Standard Section 2.2's
// "Modules 1–4 have five beats each" line is stale (Module 1 and 4 both have 4;
// only Module 2 has 5). Built to 2 beats, consistent with the persona doc and tracker.
// Miss position varies across the two beats (Beat 1 = A, Beat 2 = C) so it isn't
// reliably in one slot.
const BEATS = [
  {
    id: 1,
    topicQuestion: `"Where will the scar be? I really don't want it to be visible."`,
    videoLabel: "Planning the Incision for an Imperceptible Scar",
    videoLabel2: "A Second Perspective on Incision Options",
    videoDesc: "How incision placement is planned in advance using a measurement-based technique so the scar falls precisely in the natural crease — and why it becomes very difficult to find at full healing, around two years out.",
    videoDesc2: "A broader comparison across incision approaches — inframammary and periareolar — and how the right choice differs for revision and reconstruction patients.",
    localSrc: "Adams_3.1.mp4",
    localSrc2: "Yates_3.1.mp4",
    predictionPrompt: "Before the video plays: what do you think an experienced surgeon says when a patient asks directly whether the scar will really be invisible?",
    claireOpen: `"I've been doing my research, and I keep coming back to one thing: I really don't want a visible scar. I know there are different options for where the incision goes — can you walk me through what those are and what the tradeoffs look like?"`,
    claireMood: "open",
    options: [
      {
        label: "A",
        text: "Honestly, you won't really be able to see it at all once you've healed — for the vast majority of patients, it basically disappears completely, so it's not something you need to spend much more time worrying about.",
        quality: "miss",
        claireReact: `"...Okay."`,
        claireMoodReact: "quiet",
        missNote: "This overpromises — no augmentation is scar-free, and claiming otherwise skips the honest conversation she specifically asked for. If she notices the scar later, this answer won't hold up.",
      },
      {
        label: "B",
        text: "Scars from this type of surgery tend to fade a lot over time, and most patients end up really happy with how they look. I wouldn't spend too much energy worrying about it — it's just not something that comes up much later.",
        quality: "weak",
        claireReact: `"Okay... but is that just, like, a general thing people say? I guess I was hoping for something more specific to what actually happens."`,
        claireMoodReact: "quiet",
        missNote: "Technically true, but generic. She already knows scars fade — she's asking for the specific, technique-level picture, and this doesn't give her one.",
      },
      {
        label: "C",
        text: "I want to be upfront: there's always a scar. But I plan the incision to fall precisely in your natural crease using measurements taken beforehand, and by full healing — usually around two years — it's genuinely difficult to find, even on close exam.",
        quality: "strong",
        claireReact: `"Okay — that actually helps. That's so much more specific than 'it'll fade,' which is honestly all anyone's told me so far."`,
        claireMoodReact: "engaged",
        strongNote: "Names the real technique (crease placement via pre-surgery planning) and gives an honest, specific timeline instead of a flat reassurance — the level of detail the persona doc identifies as what earns her trust.",
      },
    ],
  },
  {
    id: 2,
    topicQuestion: `"My friend had her breast augmentation over or under the muscle — what does that actually mean?"`,
    videoLabel: "Choosing Implant Placement: Over vs. Under the Muscle",
    videoLabel2: "A Second Perspective: Matching Placement to Tissue Type",
    videoDesc: "A patient-dependent breakdown of implant placement — tissue coverage, concealment, the animation deformity tradeoff, and how mammography and recovery factor into the decision.",
    videoDesc2: "A more targeted framework tied to specific anatomy — thinner tissue favoring a sub-muscular placement, and tuberous breast anatomy favoring a subglandular approach.",
    localSrc: "Mosh_3.2.mp4",
    localSrc2: "Yates_3.2.mp4",
    predictionPrompt: "Before the video plays: what do you think an experienced surgeon says when a patient's friend told her one placement is simply 'better' than the other?",
    claireOpen: `"I've heard some people go over the muscle and some go under — which is better? My friend mentioned it like it was a big decision, but I don't really understand what the difference actually is."`,
    claireMood: "open",
    options: [
      {
        label: "A",
        text: "For most of my patients, I recommend placing the implant under the muscle — that placement tends to give the most natural, well-concealed result, and it's generally what I'd suggest for you as well.",
        quality: "weak",
        claireReact: `"Okay, good to know. So that's just the standard approach, then?"`,
        claireMoodReact: "quiet",
        missNote: "This gives a real recommendation but no reasoning behind it — she's left with a decision, not an understanding, exactly the pattern the persona doc flags as leaving her to comply in the room and second-guess later.",
      },
      {
        label: "B",
        text: "Most patients do better with the implant under the muscle — better concealment, less rippling, more stable positioning long-term. But for someone with very little natural tissue, that can risk visible movement when you flex, so the right placement really depends on your own anatomy.",
        quality: "strong",
        claireReact: `"Okay, that makes sense — so it's not that one is just better, it depends on what my own tissue is actually like?"`,
        claireMoodReact: "engaged",
        strongNote: "States the real default and the real counterargument (tissue-dependent animation deformity risk), and frames the decision as anatomy-specific rather than a fixed rule — the 'framework, not a verdict' her persona doc says she needs.",
      },
      {
        label: "C",
        text: "Honestly, it's mostly just personal preference at this point — whichever placement you feel more comfortable with is completely fine, since there's not a huge difference in how things turn out either way.",
        quality: "miss",
        claireReact: `"...Okay."`,
        claireMoodReact: "quiet",
        missNote: "This flattens a genuine clinical tradeoff into 'it doesn't really matter,' which isn't accurate and skips the reasoning she's specifically asking for.",
      },
    ],
  },
];

const CLOSING_PROMPT = "Claire came in with one clear, specific worry — the scar — and left having worked through two of the biggest decisions in this consultation: incision and placement. Looking back, what's one moment where you did more than answer her question — where you actually helped her build the framework she came in for?";

// ── Utility ───────────────────────────────────────────────────────────────────
// Second-perspective nudge phrasing — same message, varied wording per beat so it
// doesn't read as repeated boilerplate. Shared pool used across modules; picked
// deterministically by beat id so it's stable within a session, not re-randomized
// on every render.
const SECOND_PERSPECTIVE_NUDGES = [
  "Haven't watched the second perspective yet? It's worth the extra couple minutes before you move on.",
  "Don't skip the second perspective — a couple more minutes, and it's worth hearing.",
  "There's a second surgeon's take above you haven't watched yet. Worth pulling up before you continue.",
  "Still haven't caught the second perspective? It only takes a couple minutes, and it's worth it.",
];
function getSecondPerspectiveNudge(beatId) {
  return SECOND_PERSPECTIVE_NUDGES[beatId % SECOND_PERSPECTIVE_NUDGES.length];
}

function scrollTop(ref) {
  if (ref && ref.current) ref.current.scrollTo({ top: 0, behavior: "smooth" });
}

// ── UI primitives ─────────────────────────────────────────────────────────────
function PrimaryBtn({ onClick, disabled, children, style = {} }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled ? "#C8D4E0" : B.blue,
      color: disabled ? "#8A9AAA" : B.white,
      border: "none", borderRadius: 10, padding: "14px 24px",
      fontSize: 15, fontWeight: 700, width: "100%",
      cursor: disabled ? "not-allowed" : "pointer",
      transition: "all 0.2s ease",
      letterSpacing: 0.3,
      ...style,
    }}>{children}</button>
  );
}

function SecondaryBtn({ onClick, children, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: "transparent", color: B.blue,
      border: `1.5px solid ${B.blue}`, borderRadius: 10,
      padding: "12px 24px", fontSize: 14, fontWeight: 600,
      width: "100%", cursor: "pointer", transition: "all 0.2s ease",
      ...style,
    }}>{children}</button>
  );
}

// ── Header ────────────────────────────────────────────────────────────────────
function Header() {
  return (
    <div style={{
      background: B.darkBlue, padding: "14px 20px",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      position: "sticky", top: 0, zIndex: 10,
      boxShadow: "0 2px 12px rgba(0,0,0,0.25)",
      gap: 10,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
        <div style={{
          width: 8, height: 8, borderRadius: "50%",
          background: B.copper,
          boxShadow: `0 0 6px ${B.copper}`,
          animation: "pulseRing 2.5s ease infinite",
          flexShrink: 0,
        }} />
        <span style={{
          color: B.white, fontSize: 12, fontWeight: 700, letterSpacing: 0.3,
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>
          MENTOR™ Residency: The Consultation Series
        </span>
      </div>
      <div style={{
        background: "rgba(255,255,255,0.08)",
        color: "rgba(255,255,255,0.6)",
        fontSize: 11, padding: "3px 10px",
        borderRadius: 20, letterSpacing: 1,
        flexShrink: 0, whiteSpace: "nowrap",
      }}>Module 3 · Prototype</div>
    </div>
  );
}

// ── Progress ──────────────────────────────────────────────────────────────────
function ProgressDots({ beatIndex, total }) {
  return (
    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 8 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: i === beatIndex ? 24 : 8,
          height: 8, borderRadius: 4,
          background: i < beatIndex ? B.copper : i === beatIndex ? B.blue : "#D0D8E4",
          transition: "all 0.3s ease",
        }} />
      ))}
    </div>
  );
}

// ── Claire bubble ─────────────────────────────────────────────────────────────
// Claire's tell (per persona doc) parallels Sarah's, not Maya's: she doesn't
// challenge out loud when a beat leaves her unsatisfied — she nods, asks one
// clarifying question at most, then goes quiet. "quiet" carries that withdrawal;
// "engaged" is reserved for the check-in moment the persona doc identifies as
// what actually earns her trust.
function ClaireBubble({ text, mood, animClass = "slide-in" }) {
  const moodStyles = {
    open:     { bg: B.lightBlue, border: B.blue },
    engaged:  { bg: "#EAF5EB",   border: "#6DBF79" },
    quiet:    { bg: B.amber,     border: B.amberBorder },
  };
  const s = moodStyles[mood] || { bg: B.cream, border: "#D0D0D0" };

  return (
    <div className={animClass} style={{
      background: s.bg,
      border: `1.5px solid ${s.border}`,
      borderRadius: "4px 16px 16px 16px",
      padding: "14px 16px", marginBottom: 16,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <div style={{
          width: 28, height: 28, borderRadius: "50%",
          background: `linear-gradient(135deg, ${B.copper} 0%, #C49060 100%)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 12, fontWeight: 700, color: B.white, flexShrink: 0,
        }}>C</div>
        <span style={{ fontSize: 12, fontWeight: 700, color: B.darkBlue, letterSpacing: 0.3 }}>CLAIRE</span>
      </div>
      <p style={{ fontSize: 15, color: B.text, lineHeight: 1.55, fontStyle: "italic" }}>{text}</p>
    </div>
  );
}

// ── Miss callout ──────────────────────────────────────────────────────────────
function MissNote({ text }) {
  return (
    <div className="slide-in" style={{
      background: "#FFF8EE", border: `1px solid ${B.amberBorder}`,
      borderLeft: `4px solid ${B.copper}`,
      borderRadius: "0 10px 10px 0",
      padding: "12px 14px", marginBottom: 16,
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#A07020", letterSpacing: 0.8, marginBottom: 4 }}>
        NOTICE THE SHIFT
      </div>
      <p style={{ fontSize: 13, color: "#705010", lineHeight: 1.5 }}>{text}</p>
    </div>
  );
}

// ── Strong-move callout ─────────────────────────────────────────────────────────
function StrongNote({ text }) {
  return (
    <div className="slide-in" style={{
      background: B.green, border: `1px solid ${B.greenBorder}`,
      borderLeft: `4px solid #4FA868`,
      borderRadius: "0 10px 10px 0",
      padding: "12px 14px", marginBottom: 16,
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#2E7D44", letterSpacing: 0.8, marginBottom: 4 }}>
        STRONG MOVE
      </div>
      <p style={{ fontSize: 13, color: "#1F5C32", lineHeight: 1.5 }}>{text}</p>
    </div>
  );
}

// ── Video card — matches MENTOR_Shared_Components_Reference.html exactly ──────
// Uses the CSS `aspectRatio` property (not paddingBottom percentage) so the
// 9:16 box stays correct once .video-frame's max-width caps it on desktop.
// See Pitfall #8. localSrc is included for GitHub-demo parity but unused in
// this build (no local mp4s here) — do not carry into the SCORM package.
function VideoCard({ label, desc, isSecond = false, animClass = "slide-in", localSrc = null, brightcoveUrl = null, vimeoId = null, streamSrc = null }) {
  return (
    <div className={animClass} style={{
      background: B.darkBlue, borderRadius: 14,
      overflow: "hidden", marginBottom: 16,
    }}>
      {isSecond && (
        <div style={{
          background: B.copper, padding: "5px 14px",
          fontSize: 11, fontWeight: 700, color: B.darkBlue,
          letterSpacing: 0.8,
        }}>SECOND PERSPECTIVE</div>
      )}
      <div style={{ padding: "16px" }}>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: 0.8, marginBottom: 6 }}>
          {isSecond ? "EXPERT VIDEO · 2 OF 2" : "EXPERT VIDEO"}
        </div>
        <div style={{ fontSize: 14, fontWeight: 700, color: B.white, marginBottom: 8, lineHeight: 1.4 }}>
          {label}
        </div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)", lineHeight: 1.5, marginBottom: 14 }}>
          {desc}
        </div>

        {localSrc ? (
          <div className="video-frame" style={{ position: "relative", aspectRatio: "9 / 16", borderRadius: 10, overflow: "hidden", background: "#000" }}>
            <video
              src={localSrc}
              controls
              playsInline
              preload="metadata"
              style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "contain" }}
              title={label}
            />
          </div>
        ) : brightcoveUrl ? (
          <div className="video-frame" style={{ position: "relative", aspectRatio: "9 / 16", borderRadius: 10, overflow: "hidden", background: "#000" }}>
            <iframe
              src={brightcoveUrl}
              allowFullScreen
              frameBorder="0"
              allow="autoplay; fullscreen; encrypted-media"
              style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", border: "none" }}
              title={label}
            />
          </div>
        ) : vimeoId ? (
          <div className="video-frame" style={{ position: "relative", aspectRatio: "9 / 16", borderRadius: 10, overflow: "hidden" }}>
            <iframe
              src={`https://player.vimeo.com/video/${vimeoId}?badge=0&autopause=0&player_id=0&app_id=58479`}
              frameBorder="0"
              allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
              referrerPolicy="strict-origin-when-cross-origin"
              style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%" }}
              title={label}
            />
          </div>
        ) : streamSrc ? (
          <div className="video-frame" style={{ position: "relative", aspectRatio: "16 / 9", borderRadius: 10, overflow: "hidden", background: "#000" }}>
            <iframe
              src={streamSrc}
              width="640" height="360"
              frameBorder="0"
              scrolling="no"
              allowFullScreen
              title={label}
              style={{ border: "none", position: "absolute", top: 0, left: 0, right: 0, bottom: 0, height: "100%", maxWidth: "100%" }}
            />
          </div>
        ) : (
          <div style={{
            background: "rgba(255,255,255,0.08)",
            borderRadius: 10, height: 52,
            display: "flex", alignItems: "center", justifyContent: "center",
            gap: 10,
          }}>
            <div style={{
              width: 0, height: 0,
              borderTop: "9px solid transparent",
              borderBottom: "9px solid transparent",
              borderLeft: `15px solid ${B.copper}`,
              marginLeft: 3,
            }} />
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", letterSpacing: 0.5 }}>
              Video coming soon
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Patient card ──────────────────────────────────────────────────────────────
// Per Standard 6.1/6.2: name → "Age [N] · [context] · First consultation" →
// italic quote box (her real opening line) → exactly 2 situational tags. No
// archetype label, no behavioral tell in the tags.
function PatientCard({ name, age, occupation, quote, tags }) {
  return (
    <div style={{
      background: B.white, borderRadius: 16,
      border: `1.5px solid #E2E8F0`,
      padding: "18px", marginBottom: 24,
      boxShadow: "0 2px 12px rgba(0,0,50,0.06)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <div style={{
          width: 44, height: 44, borderRadius: "50%",
          background: `linear-gradient(135deg, ${B.copper} 0%, #B87840 100%)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 18, fontWeight: 800, color: B.white,
        }}>{name[0]}</div>
        <div>
          <div style={{ fontWeight: 700, color: B.darkBlue, fontSize: 16 }}>{name}</div>
          <div style={{ fontSize: 12, color: B.midGrey }}>Age {age} · {occupation} · First consultation</div>
        </div>
      </div>
      <div style={{
        background: B.softGrey, borderRadius: 10,
        padding: "12px 14px", marginBottom: 12,
        borderLeft: `3px solid ${B.copper}`,
      }}>
        <p style={{ fontSize: 13, color: B.text, lineHeight: 1.55, fontStyle: "italic" }}>
          "{quote}"
        </p>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {tags.map(tag => (
          <span key={tag} style={{
            background: B.lightBlue, color: B.blue,
            fontSize: 11, fontWeight: 600, padding: "3px 9px",
            borderRadius: 20, letterSpacing: 0.3,
          }}>{tag}</span>
        ))}
      </div>
    </div>
  );
}

// ── Shell ─────────────────────────────────────────────────────────────────────
function Shell({ children, scrollRef }) {
  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #f8f2ed 0%, #F0F4F8 100%)",
      display: "flex", justifyContent: "center",
      fontFamily: "'Segoe UI', system-ui, sans-serif",
    }}>
      <div className="app-shell" style={{ width: "100%", display: "flex", flexDirection: "column" }}>
        <Header />
        <div ref={scrollRef} style={{ padding: "24px 20px 60px", flex: 1, overflowY: "auto" }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ── Label ─────────────────────────────────────────────────────────────────────
function SectionLabel({ children }) {
  return (
    <div style={{
      fontSize: 10, fontWeight: 700, letterSpacing: 1.2,
      color: B.midGrey, marginBottom: 10, textTransform: "uppercase",
    }}>{children}</div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════════════════════════════

function IntroScreen({ onStart }) {
  return (
    <div className="fade-in">
      {/* Module badge */}
      <div style={{
        display: "inline-flex", alignItems: "center", gap: 6,
        background: B.lightBlue, borderRadius: 20,
        padding: "5px 12px", marginBottom: 20,
      }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: B.blue, letterSpacing: 0.8 }}>
          MODULE 3
        </span>
      </div>

      <h1 style={{ fontSize: 26, fontWeight: 400, color: B.darkBlue, lineHeight: 1.25, marginBottom: 12 }}>
        Communicating Options: Incisions, Placement &amp; Tradeoffs
      </h1>
      <p style={{ fontSize: 14, color: B.copper, lineHeight: 1.5, marginBottom: 10, fontWeight: 400 }}>
        Module 2 covered how anatomy drives implant choice and how measurements become decisions. This module moves into the conversation itself — where the incision goes, and where the implant sits.
      </p>
      <p style={{ fontSize: 15, color: "#4A5568", lineHeight: 1.6, marginBottom: 24 }}>
        You're about to meet Claire — a 47-year-old patient in her first consultation, about eighteen months past her divorce and finally making decisions for herself. She's done enough research to know the vocabulary, but she's here because she wants to actually understand her options, not just be handed a recommendation.
      </p>

      <div className="desktop-row">
      <PatientCard
        name="Claire"
        age={47}
        occupation="Recently promoted"
        quote="I've been doing my research, and I keep coming back to one thing: I really don't want a visible scar. I know there are different options for where the incision goes — can you walk me through what those are and what the tradeoffs look like?"
        tags={["No visible scar", "Wants the reasoning why"]}
      />

      {/* How it works */}
      <div style={{
        background: B.white, borderRadius: 16,
        border: `1.5px solid #E2E8F0`, padding: "18px", marginBottom: 28,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: B.darkBlue, letterSpacing: 0.5, marginBottom: 12 }}>
          HOW THIS WORKS
        </div>
        {[
          "Claire speaks. Read carefully — not just what she says, but how she says it.",
          "Choose your response. Three options are available.",
          "See how Claire reacts, then make your best guess before the surgeon video plays.",
          "Hear from experienced surgeons, then continue the consultation.",
        ].map((step, i) => (
          <div key={i} style={{ display: "flex", gap: 12, marginBottom: i < 3 ? 10 : 0 }}>
            <div style={{
              width: 22, height: 22, borderRadius: "50%",
              background: B.darkBlue, color: B.white,
              fontSize: 11, fontWeight: 700,
              display: "flex", alignItems: "center", justifyContent: "center",
              flexShrink: 0, marginTop: 1,
            }}>{i + 1}</div>
            <p style={{ fontSize: 13, color: "#4A5568", lineHeight: 1.5 }}>{step}</p>
          </div>
        ))}
      </div>
      </div>

      <PrimaryBtn onClick={onStart}>Begin consultation →</PrimaryBtn>
    </div>
  );
}

// ── Beat screen ───────────────────────────────────────────────────────────────
function BeatScreen({ beat, beatIndex, total, onChosen, onBack, scrollRef }) {
  const [chosen, setChosen] = useState(null);
  const [showVideo, setShowVideo] = useState(false);
  const [showVideo2, setShowVideo2] = useState(false);
  const [guess, setGuess] = useState("");
  const [guessSubmitted, setGuessSubmitted] = useState(false);
  const [hovered, setHovered] = useState(null);

  const opt = chosen !== null ? beat.options[chosen] : null;
  const isMiss = opt && (opt.quality === "miss" || opt.quality === "weak");
  const isStrong = opt && opt.quality === "strong";
  const hasTwoVideos = !!beat.videoLabel2;

  function handleChoose(idx) {
    if (chosen !== null) return;
    setChosen(idx);
    setTimeout(() => scrollTop(scrollRef), 100);
  }

  function handleReconsider() {
    setChosen(null);
    setTimeout(() => scrollTop(scrollRef), 100);
  }

  function handleSubmitGuess() {
    setGuessSubmitted(true);
    setShowVideo(true);
    setTimeout(() => scrollTop(scrollRef), 100);
  }

  function handleNext() {
    onChosen(chosen);
  }

  return (
    <div>
      <ProgressDots beatIndex={beatIndex} total={total} />
      <div style={{ fontSize: 11, color: B.midGrey, textAlign: "center", marginBottom: 20 }}>
        Topic {beatIndex + 1} of {total} · Module 3
      </div>

      {/* Claire opens */}
      <ClaireBubble text={beat.claireOpen} mood={beat.claireMood} animClass="slide-in" />

      {/* Options or reaction */}
      {chosen === null ? (
        <div className="slide-in-delay">
          <SectionLabel>Your response</SectionLabel>
          {beat.options.map((opt, idx) => (
            <button
              key={idx}
              onClick={() => handleChoose(idx)}
              onMouseEnter={() => setHovered(idx)}
              onMouseLeave={() => setHovered(null)}
              style={{
                background: hovered === idx ? B.lightBlue : B.white,
                border: `1.5px solid ${hovered === idx ? B.blue : "#D8E2EE"}`,
                borderRadius: 12, padding: "14px 16px",
                marginBottom: 10, width: "100%", textAlign: "left",
                cursor: "pointer", transition: "all 0.18s ease",
                display: "flex", gap: 12, alignItems: "flex-start",
              }}
            >
              <div style={{
                width: 24, height: 24, borderRadius: "50%",
                background: hovered === idx ? B.blue : "#E2EAF4",
                color: hovered === idx ? B.white : B.blue,
                fontSize: 12, fontWeight: 700, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.18s ease",
              }}>{opt.label}</div>
              <span style={{ fontSize: 14, color: B.text, lineHeight: 1.5 }}>{opt.text}</span>
            </button>
          ))}
          <div style={{ marginTop: 6 }}>
            <SecondaryBtn onClick={onBack}>
              {beatIndex === 0 ? "Back to start" : "Back to previous topic"}
            </SecondaryBtn>
          </div>
        </div>
      ) : (
        <div>
          {/* Chosen option recap */}
          <div className="slide-in" style={{
            background: B.softGrey, borderRadius: 10,
            border: "1.5px solid #D8E2EE",
            padding: "12px 14px", marginBottom: 14,
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: B.midGrey, letterSpacing: 0.8, marginBottom: 6 }}>
              YOUR RESPONSE
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{
                width: 22, height: 22, borderRadius: "50%",
                background: B.blue, color: B.white,
                fontSize: 11, fontWeight: 700, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>{opt.label}</div>
              <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>{opt.text}</p>
            </div>
          </div>

          {/* Claire's reaction */}
          <ClaireBubble text={opt.claireReact} mood={opt.claireMoodReact} animClass="slide-in" />

          {/* Miss note */}
          {isMiss && opt.missNote && <MissNote text={opt.missNote} />}

          {/* Strong-move note */}
          {isStrong && opt.strongNote && <StrongNote text={opt.strongNote} />}

          {/* Option to handle this moment differently, before committing to the videos */}
          {!guessSubmitted && (
            <div className="slide-in-delay" style={{ marginBottom: 16 }}>
              <SecondaryBtn onClick={handleReconsider}>
                Handle this differently
              </SecondaryBtn>
            </div>
          )}

          {/* Guess or video */}
          {!guessSubmitted ? (
            <div className="slide-in-delay" style={{
              background: B.white, borderRadius: 14,
              border: `1.5px solid #D8E2EE`, padding: "16px", marginBottom: 16,
            }}>
              <SectionLabel>Before the video plays</SectionLabel>
              <p style={{ fontSize: 14, color: B.text, lineHeight: 1.55, marginBottom: 12 }}>
                {beat.predictionPrompt}
              </p>
              <textarea
                value={guess}
                onChange={e => setGuess(e.target.value)}
                placeholder="Write your answer here..."
                rows={3}
                style={{
                  width: "100%", padding: "10px 12px",
                  border: `1.5px solid ${guess.trim().length > 0 ? B.blue : "#D8E2EE"}`,
                  borderRadius: 10, fontSize: 14, lineHeight: 1.5,
                  resize: "none", outline: "none", color: B.text,
                  transition: "border-color 0.2s",
                  background: B.softGrey,
                }}
              />
              {guess.trim().length > 0 && guess.trim().length < 3 && (
                <p style={{ fontSize: 12, color: "#E57373", marginTop: 4 }}>
                  Add a few more words to continue.
                </p>
              )}
              <div style={{ marginTop: 12 }}>
                <PrimaryBtn
                  onClick={handleSubmitGuess}
                  disabled={guess.trim().length < 3}
                >
                  {hasTwoVideos ? "Watch the surgeon videos →" : "Watch the surgeon video →"}
                </PrimaryBtn>
              </div>
            </div>
          ) : (
            <div>
              {/* Guess recap */}
              <div className="fade-in" style={{
                background: B.softGrey, borderRadius: 10,
                border: "1.5px solid #D8E2EE",
                padding: "12px 14px", marginBottom: 14,
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: B.midGrey, letterSpacing: 0.8, marginBottom: 5 }}>
                  YOUR ANSWER
                </div>
                <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5, fontStyle: "italic" }}>
                  "{guess}"
                </p>
              </div>

              {/* Video 1 */}
              {showVideo && (
                <VideoCard
                  label={beat.videoLabel}
                  desc={beat.videoDesc}
                  localSrc={beat.localSrc || null}
                  vimeoId={beat.vimeoId || null}
                  streamSrc={beat.streamSrc || null}
                  brightcoveUrl={beat.brightcoveUrl || null}
                  animClass="slide-in"
                />
              )}

              {/* Video 2 trigger or card */}
              {hasTwoVideos && showVideo && !showVideo2 && (
                <div className="slide-in-delay" style={{
                  background: B.white, borderRadius: 12,
                  border: `1.5px solid ${B.copper}`,
                  padding: "14px 16px", marginBottom: 16,
                }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#A06020", letterSpacing: 0.5, marginBottom: 6 }}>
                    ANOTHER PERSPECTIVE
                  </div>
                  <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5, marginBottom: 12 }}>
                    {beat.videoDesc2}
                  </p>
                  <SecondaryBtn onClick={() => { setShowVideo2(true); setTimeout(() => scrollTop(scrollRef), 100); }}>
                    Watch second perspective →
                  </SecondaryBtn>
                </div>
              )}

              {hasTwoVideos && showVideo2 && (
                <VideoCard
                  label={beat.videoLabel2}
                  desc={beat.videoDesc2}
                  localSrc={beat.localSrc2 || null}
                  vimeoId={beat.vimeoId2 || null}
                  brightcoveUrl={beat.brightcoveUrl2 || null}
                  isSecond={true}
                  animClass="slide-in"
                />
              )}

              {/* Nudge if a second perspective exists but hasn't been watched yet */}
              {hasTwoVideos && showVideo && !showVideo2 && (
                <div className="slide-in" style={{
                  background: "#FFF8EE", border: `1.5px solid ${B.amberBorder}`,
                  borderLeft: `4px solid ${B.copper}`,
                  borderRadius: "0 10px 10px 0",
                  padding: "12px 14px", marginBottom: 16,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#A07020", letterSpacing: 0.8, marginBottom: 4 }}>
                    WORTH A LOOK
                  </div>
                  <p style={{ fontSize: 13, color: "#705010", lineHeight: 1.5 }}>
                    {getSecondPerspectiveNudge(beat.id)}
                  </p>
                </div>
              )}

              {/* Advance button — first video is enough to continue; second perspective is offered, not required */}
              {showVideo ? (
                <div className="slide-in-delay">
                  <PrimaryBtn onClick={handleNext}>
                    {beatIndex < total - 1 ? "Continue consultation →" : "Finish the consultation →"}
                  </PrimaryBtn>
                  <div style={{ marginTop: 10 }}>
                    <SecondaryBtn onClick={handleReconsider}>
                      Go back over this topic
                    </SecondaryBtn>
                  </div>
                </div>
              ) : null}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Closing screen ────────────────────────────────────────────────────────────
// (Named "closing," not "reflection" — resident-facing copy avoids ID vocabulary.)
function ClosingScreen({ onFinish, onBack, scrollRef }) {
  const [response, setResponse] = useState("");

  return (
    <div className="fade-in">
      <div style={{
        background: B.darkBlue, borderRadius: 16,
        padding: "20px", marginBottom: 24,
      }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: B.copper, letterSpacing: 0.8, marginBottom: 8 }}>
          THE CONSULTATION ENDS
        </div>
        <div style={{
          background: "rgba(255,255,255,0.07)",
          borderRadius: 10, padding: "12px 14px",
          borderLeft: `3px solid ${B.copper}`,
        }}>
          <p style={{ fontSize: 14, color: "rgba(255,255,255,0.85)", lineHeight: 1.55, fontStyle: "italic" }}>
            "Okay. I think I can actually explain this to myself now — not just remember what you said, but why it makes sense for me."
          </p>
          <div style={{ fontSize: 12, color: B.copper, marginTop: 6, fontWeight: 600 }}>— Claire</div>
        </div>
      </div>

      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 20, fontWeight: 400, color: B.darkBlue, marginBottom: 10 }}>
          One last question
        </h2>
        <p style={{ fontSize: 15, color: "#4A5568", lineHeight: 1.6, marginBottom: 16 }}>
          {CLOSING_PROMPT}
        </p>
        <textarea
          value={response}
          onChange={e => setResponse(e.target.value)}
          placeholder="Write your answer here..."
          rows={5}
          style={{
            width: "100%", padding: "12px 14px",
            border: `1.5px solid ${response.trim().length > 0 ? B.blue : "#D8E2EE"}`,
            borderRadius: 12, fontSize: 14, lineHeight: 1.6,
            resize: "none", outline: "none", color: B.text,
            background: B.softGrey, transition: "border-color 0.2s",
          }}
        />
        {response.trim().length > 0 && response.trim().length < 3 && (
          <p style={{ fontSize: 12, color: "#E57373", marginTop: 4 }}>
            Add a few more words to continue.
          </p>
        )}
      </div>

      <PrimaryBtn onClick={onFinish} disabled={response.trim().length < 3}>
        Finish Module 3 →
      </PrimaryBtn>
      <div style={{ marginTop: 10 }}>
        <SecondaryBtn onClick={onBack}>Back to previous topic</SecondaryBtn>
      </div>
    </div>
  );
}

// ── Complete screen ───────────────────────────────────────────────────────────

  const topics = [
    "Reframing \"no visible scar\" as a realistic, technique-specific outcome instead of a vague reassurance",
    "Explaining implant placement as an anatomy-dependent tradeoff, not a fixed rule",
  ];

  return (
    <div className="fade-in">
      <div style={{
        background: `linear-gradient(135deg, ${B.darkBlue} 0%, #003D5C 100%)`,
        borderRadius: 20, padding: "24px 20px", marginBottom: 24,
        textAlign: "center",
      }}>
        <div style={{
          width: 52, height: 52, borderRadius: "50%",
          background: B.copper, margin: "0 auto 14px",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 22,
        }}>✓</div>
        <h2 style={{ fontSize: 22, fontWeight: 400, color: B.white, marginBottom: 8 }}>
          Module 3 complete
        </h2>
        <p style={{ fontSize: 14, color: "rgba(255,255,255,0.7)", lineHeight: 1.5 }}>
          Communicating Options: Incisions, Placement &amp; Tradeoffs
        </p>
      </div>

      <div style={{
        background: B.white, borderRadius: 16,
        border: "1.5px solid #E2E8F0", padding: "18px", marginBottom: 20,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: B.darkBlue, letterSpacing: 0.5, marginBottom: 14 }}>
          TOPICS COVERED IN THIS MODULE
        </div>
        {topics.map((t, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: i < topics.length - 1 ? 10 : 0 }}>
            <div style={{
              width: 20, height: 20, borderRadius: "50%",
              background: "#EDF7EE", border: "1.5px solid #6DBF79",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 10, color: "#3A8A46", fontWeight: 800, flexShrink: 0,
            }}>✓</div>
            <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>{t}</p>
          </div>
        ))}
      </div>

      {/* Deliberately does not name a returning patient — Sarah's Module 4 return
          is discovered in-experience, not previewed in upstream summary copy. */}
      <div style={{
        background: B.lightBlue, borderRadius: 14,
        border: `1.5px solid ${B.blue}`,
        padding: "14px 16px", marginBottom: 24,
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: B.blue, letterSpacing: 0.5, marginBottom: 6 }}>
          COMING UP IN MODULE 4
        </div>
        <p style={{ fontSize: 13, color: B.text, lineHeight: 1.5 }}>
          Recovery, Longevity &amp; Patient Readiness — moving past the consultation room into what happens next: recovery expectations, implant longevity, and safety.
        </p>
      </div>

      {/* Full-width bottom button, not a small text link — per the Module 1/2 audit */}
      <SecondaryBtn onClick={onReplay}>Replay Module 3</SecondaryBtn>

      <div style={{ fontSize: 11, color: B.midGrey, textAlign: "center", marginTop: 20, letterSpacing: 0.5 }}>
        MENTOR™ Residency: The Consultation Series · Module 3 · Prototype
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════

function App() {
  const [phase, setPhase] = useState("intro"); // intro | beat | closing | complete
  const [beatIndex, setBeatIndex] = useState(0);
  const scrollRef = useRef(null);

  function start() {
    setPhase("beat");
    setBeatIndex(0);
    scrollTop(scrollRef);
  }

  function handleBeatDone() {
    scrollTop(scrollRef);
    if (beatIndex < BEATS.length - 1) {
      setBeatIndex(i => i + 1);
    } else {
      setPhase("closing");
    }
  }

  function handleBeatBack() {
    scrollTop(scrollRef);
    if (beatIndex > 0) {
      setBeatIndex(i => i - 1);
    } else {
      setPhase("intro");
    }
  }

  function handleClosingDone() {
    setPhase("complete");
    scrollTop(scrollRef);
  }

  function handleClosingBack() {
    setPhase("beat");
    setBeatIndex(BEATS.length - 1);
    scrollTop(scrollRef);
  }

  function replay() {
    setPhase("intro");
    setBeatIndex(0);
    scrollTop(scrollRef);
  }

  return (
    <Shell scrollRef={scrollRef}>
      {phase === "intro" && <IntroScreen onStart={start} />}
      {phase === "beat" && (
        <BeatScreen
          key={beatIndex}
          beat={BEATS[beatIndex]}
          beatIndex={beatIndex}
          total={BEATS.length}
          onChosen={handleBeatDone}
          onBack={handleBeatBack}
          scrollRef={scrollRef}
        />
      )}
      {phase === "closing" && (
        <ClosingScreen onFinish={handleClosingDone} onBack={handleClosingBack} scrollRef={scrollRef} />
      )}
      {phase === "complete" && <CompleteScreen onReplay={replay} />}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
